services:
  web:
    build:
      context: ./backend
    env_file: .env
    runtime: python-3.11
    build_command: "pip install -r requirements.txt"
    start_command: "uvicorn main:app --host 0.0.0.0 --port 10000"
    plan: free
    
  frontend:
    build:
      context: ./frontend
    build_command: "npm install && npm run build"
    start_command: "npm run preview"
    plan: free
